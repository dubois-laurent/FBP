services:
  db:
    image: postgres:16-alpine
    container_name: fpb_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fpb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fpb_password}
      POSTGRES_DB: ${POSTGRES_DB:-fpb_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fpb_user} -d ${POSTGRES_DB:-fpb_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: fpb_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-fpb_user}:${POSTGRES_PASSWORD:-fpb_password}@db:5432/${POSTGRES_DB:-fpb_db}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3000/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "3000:3000"
    volumes:
      - ./packages/backend/src:/app/src
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: fpb_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3000}
    ports:
      - "5173:5173"
    volumes:
      - ./packages/frontend/src:/app/src

volumes:
  postgres_data:
