name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

defaults:
  run:
    shell: bash

jobs:
  backend:
    name: Backend — typecheck & tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter backend exec tsc --noEmit --project tsconfig.json

      - name: Run tests
        run: pnpm --filter backend test
        env:
          NODE_ENV: test
          # Ce sont des fausses variables pour valider le schéma Zod (DB est mockée dans les tests)
          DATABASE_URL: postgresql://test:test@localhost:5432/fbp_test
          JWT_ACCESS_SECRET: test_access_secret_min_32_characters_long
          JWT_REFRESH_SECRET: test_refresh_secret_min_32_characters_long
          GOOGLE_CLIENT_ID: test_google_client_id
          GOOGLE_CLIENT_SECRET: test_google_client_secret
          GOOGLE_CALLBACK_URL: http://localhost:3000/auth/google/callback
          FRONTEND_URL: http://localhost:5173

  frontend:
    name: Frontend — typecheck & tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter frontend exec tsc --noEmit

      - name: Run tests
        run: pnpm --filter frontend test
